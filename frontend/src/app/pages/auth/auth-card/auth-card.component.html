<app-card [cardClass]="'auth-card ' + cardClass">
  <div class="brand-header" *ngIf="title">
    <h1 class="brand-title">{{ title }}</h1>
    <p class="subtitle" *ngIf="description">{{ description }}</p>
  </div>

  <div class="form-content">
    <ng-content></ng-content>
    
    <app-button
      *ngIf="buttonLabel"
      [label]="buttonLabel"
      [color]="buttonColor"
      [disabled]="buttonDisabled || isLoading"
      [isLoading]="isLoading"
      [type]="buttonType"
      expand="block"
      (buttonClick)="onButtonClick()"
      class="submit-button"
    ></app-button>
  </div>
</app-card>
