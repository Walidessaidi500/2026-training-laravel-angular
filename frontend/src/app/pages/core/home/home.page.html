<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>TPV - Yurest</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="cards-container">
    <!-- Login Card -->
    <app-auth-card
      title="Iniciar Sesión"
      description="Accede a tu cuenta para gestionar tu negocio"
      buttonLabel="Ir a Login"
      buttonColor="primary"
      cardType="login"
      (buttonClick)="navigateToLogin()"
    ></app-auth-card>

    <!-- Register Card -->
    <app-auth-card
      title="Crear Cuenta"
      description="Regístrate para comenzar a usar nuestro sistema"
      buttonLabel="Ir a Registro"
      buttonColor="tertiary"
      cardType="register"
      (buttonClick)="navigateToRegister()"
    ></app-auth-card>
  </div>
</ion-content>
