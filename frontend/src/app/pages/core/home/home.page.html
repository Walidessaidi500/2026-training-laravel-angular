<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>TPV - Yurest</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="cards-container">
    <!-- Login Card -->

  </div>
</ion-content>
