<ion-content>
  <div class="dashboard-container">
    <!-- Page Title -->
    <div class="dashboard-header">
      <h1>Dashboard</h1>
      <p class="subtitle">Resumen general del sistema TPV</p>
    </div>

    <!-- Statistics Cards -->
    <div class="stats-grid">
      <app-stat-card
        label="Productos Activos"
        [value]="activeProducts"
        icon="layers"
        color="primary"
      ></app-stat-card>
      <app-stat-card
        label="Familias"
        [value]="totalFamilies"
        icon="folder"
        color="secondary"
      ></app-stat-card>
      <app-stat-card
        label="Impuestos"
        [value]="totalTaxes"
        icon="calculator"
        color="tertiary"
      ></app-stat-card>
      <app-stat-card
        label="Zonas"
        [value]="totalZones"
        icon="map"
        color="success"
      ></app-stat-card>
    </div>

    <!-- Summary Cards -->
    <ion-grid>
      <ion-row>
        <ion-col sizeXl="6" sizeLg="6" sizeMd="12">
          <ion-card class="summary-card">
            <ion-card-header>
              <ion-card-title>Resumen Rápido</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <div class="summary-item">
                <span class="summary-label">Total productos</span>
                <span class="summary-value">{{ totalProducts }}</span>
              </div>
              <div class="summary-item">
                <span class="summary-label">Productos inactivos</span>
                <span class="summary-value">{{ totalProducts - activeProducts }}</span>
              </div>
              <div class="summary-item">
                <span class="summary-label">Familias activas</span>
                <span class="summary-value">{{ activeFamilies }}</span>
              </div>
              <div class="summary-item">
                <span class="summary-label">Total zonas</span>
                <span class="summary-value">{{ totalZones }}</span>
              </div>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col sizeXl="6" sizeLg="6" sizeMd="12">
          <ion-card class="summary-card">
            <ion-card-header>
              <ion-card-title>Actividad Reciente</ion-card-title>
            </ion-card-header>
            <ion-card-content>
              <div class="activity-empty">
                <p>No hay actividad reciente</p>
              </div>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
