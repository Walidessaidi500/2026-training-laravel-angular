<ion-content class="users-background">

  <!-- Mensaje si no es admin -->
  <app-access-denied *ngIf="!isAdmin && !isLoading" [user]="currentUser"
    message="Esta página solo está disponible para administradores.">
  </app-access-denied>

  <!-- Skeleton Loading -->
  <div class="page-container" *ngIf="isLoading">
    <div class="page-header">
      <ion-skeleton-text animated style="height: 40px; border-radius: 12px; max-width: 300px;"></ion-skeleton-text>
    </div>
    <div class="stats-grid two-cols">
      <ion-skeleton-text animated style="height: 100px; border-radius: 16px;"
        *ngFor="let i of [1,2,3,4]"></ion-skeleton-text>
    </div>
    <div class="table-skeleton">
      <ion-skeleton-text animated style="height: 500px; border-radius: 16px;"></ion-skeleton-text>
    </div>
  </div>

  <!-- Content -->
  <div class="page-container" *ngIf="!isLoading && isAdmin">

    <app-page-header
      title="Gestión de Usuarios"
      subtitle="Administra todos los usuarios y sus permisos"
      buttonText="Nuevo Usuario"
      buttonIcon="add-outline"
      [showButton]="true"
      (actionClick)="addNewUser()">
    </app-page-header>

    <!-- Stats -->
    <div class="stats-grid two-cols">
      <div class="panel-card stat-card">
        <div class="stat-content">
          <div class="icon-box primary-light">
            <ion-icon name="people" color="primary"></ion-icon>
          </div>
          <div>
            <div class="stat-value">{{ userStats.total }}</div>
            <div class="stat-label">TOTAL DE USUARIOS</div>
          </div>
        </div>
      </div>

      <div class="panel-card stat-card">
        <div class="stat-content">
          <div class="icon-box warning-light">
            <ion-icon name="shield" color="warning"></ion-icon>
          </div>
          <div>
            <div class="stat-value">{{ userStats.admins }}</div>
            <div class="stat-label">ADMINISTRADORES</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="panel-card filter-panel">
      <div class="search-section">
        <ion-searchbar placeholder="Buscar por nombre o email..." (ionChange)="onSearchChange($event)"
          [value]="searchTerm" class="custom-searchbar"></ion-searchbar>
      </div>

      <div class="filter-section">
        <span class="filter-label">FILTRAR POR ROL:</span>
        <ion-segment [value]="selectedRole" (ionChange)="onRoleChange($event)" class="role-segment">
          <ion-segment-button value="all">
            <ion-label>Todos</ion-label>
          </ion-segment-button>
          <ion-segment-button value="admin">
            <ion-label>Admin</ion-label>
          </ion-segment-button>
          <ion-segment-button value="supervisor">
            <ion-label>Supervisor</ion-label>
          </ion-segment-button>
          <ion-segment-button value="operator">
            <ion-label>Operador</ion-label>
          </ion-segment-button>
        </ion-segment>
      </div>
    </div>

    <!-- Table Panel -->
    <app-data-list
      [label]="'USUARIOS ' + (selectedRole !== 'all' ? '- ' + selectedRole.toUpperCase() : '')"
      [title]="filteredUsers.length + ' usuario(s)'"
      emptyIcon="people-outline"
      emptyTitle="No hay usuarios"
      [emptyDescription]="(searchTerm || selectedRole !== 'all') ? 'No se encontraron usuarios con esos filtros' : 'Comienza agregando el primer usuario'"
      [items]="filteredUsers"
      [itemTemplate]="userItemRef">
    </app-data-list>

    <ng-template #userItemRef let-user>
      <ion-item lines="none" class="user-item animated-fadeIn">
        <div slot="start" class="avatar-circle">
          {{ getInitials(user.name) }}
        </div>

        <ion-label class="user-info">
          <h2>{{ user.name }}</h2>
          <p class="user-email">{{ user.email }}</p>
          <div class="user-meta">
            <span class="status-badge active" [ngClass]="getRoleBadgeClass(user.role)">
              <ion-icon name="person-outline"></ion-icon>
              {{ user.role | uppercase }}
            </span>
          </div>
        </ion-label>

        <div slot="end" class="actions">
          <button class="action-btn edit-btn" (click)="editUser(user)" title="Editar">
            <ion-icon name="create-outline"></ion-icon>
          </button>
          <button class="action-btn delete-btn" (click)="deleteUser(user)" title="Eliminar">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </ion-item>
    </ng-template>
  </div>
</ion-content>
