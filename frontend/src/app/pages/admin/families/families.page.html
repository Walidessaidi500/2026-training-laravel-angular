<ion-content class="families-background">
  <app-access-denied *ngIf="!isAdmin && !isLoading" [user]="currentUser"
    message="Esta página solo está disponible para administradores."></app-access-denied>

  <!-- Skeleton Loading -->
  <div class="page-container" *ngIf="isLoading">
    <div class="page-header">
      <ion-skeleton-text animated style="height: 40px; border-radius: 12px; max-width: 300px;"></ion-skeleton-text>
    </div>
    <div class="stats-grid two-cols">
      <ion-skeleton-text animated style="height: 100px; border-radius: 16px;"
        *ngFor="let i of [1,2]"></ion-skeleton-text>
    </div>
    <div class="table-skeleton">
      <ion-skeleton-text animated style="height: 500px; border-radius: 16px;"></ion-skeleton-text>
    </div>
  </div>

  <!-- Content -->
  <div class="page-container" *ngIf="!isLoading && isAdmin">

    <app-page-header
      title="Familias de Productos"
      subtitle="Organiza tu catálogo en categorías lógicas"
      buttonText="Nueva Familia"
      buttonIcon="add-outline"
      [showButton]="true"
      (actionClick)="addNewFamily()">
    </app-page-header>

    <!-- Stats -->
    <div class="stats-grid two-cols">
      <div class="panel-card stat-card">
        <div class="stat-content">
          <div class="icon-box primary-light">
            <ion-icon name="folder" color="primary"></ion-icon>
          </div>
          <div>
            <div class="stat-value">{{ familyStats.total }}</div>
            <div class="stat-label">TOTAL FAMILIAS</div>
          </div>
        </div>
      </div>

      <div class="panel-card stat-card">
        <div class="stat-content">
          <div class="icon-box success-light">
            <ion-icon name="checkmark-circle" color="success"></ion-icon>
          </div>
          <div>
            <div class="stat-value">{{ familyStats.active }}</div>
            <div class="stat-label">FAMILIAS ACTIVAS</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="panel-card filter-panel">
      <div class="search-section">
        <ion-searchbar placeholder="Buscar familia por nombre..." (ionChange)="onSearchChange($event)"
          [value]="searchTerm" class="custom-searchbar"></ion-searchbar>
      </div>

      <div class="filter-section">
        <span class="filter-label">FILTRAR POR ESTADO:</span>
        <ion-segment [value]="selectedStatus" (ionChange)="onStatusChange($event)" class="status-segment">
          <ion-segment-button value="all">
            <ion-label>Todas</ion-label>
          </ion-segment-button>
          <ion-segment-button value="active">
            <ion-label>Activas</ion-label>
          </ion-segment-button>
          <ion-segment-button value="inactive">
            <ion-label>Inactivas</ion-label>
          </ion-segment-button>
        </ion-segment>
      </div>
    </div>

    <!-- Main List -->
    <app-data-list
      label="LISTADO DE FAMILIAS"
      [title]="filteredFamilies.length + ' familia(s)'"
      emptyIcon="folder-outline"
      emptyTitle="No hay familias"
      [emptyDescription]="searchTerm ? 'No se encontraron familias que coincidan' : 'Comienza agregando la primera familia'"
      [items]="filteredFamilies"
      [itemTemplate]="familyItemRef">
    </app-data-list>

    <ng-template #familyItemRef let-family>
      <ion-item lines="none" class="family-item animated-fadeIn">
        <ion-label class="family-info">
          <h2>{{ family.name }}</h2>
          <div class="family-meta">
            <span class="status-badge" [ngClass]="family.active ? 'active' : 'inactive'"
              (click)="toggleFamilyStatus(family)" style="cursor: pointer;">
              <ion-icon [name]="family.active ? 'checkmark-circle' : 'close-circle'"></ion-icon>
              {{ family.active ? 'ACTIVA' : 'INACTIVA' }}
            </span>
          </div>
        </ion-label>
        <div slot="end" class="actions">
          <button class="action-btn edit-btn" (click)="editFamily(family)" title="Editar">
            <ion-icon name="create-outline"></ion-icon>
          </button>
          <button class="action-btn delete-btn" (click)="deleteFamily(family)" title="Eliminar">
            <ion-icon name="trash-outline"></ion-icon>
          </button>
        </div>
      </ion-item>
    </ng-template>
  </div>
</ion-content>
