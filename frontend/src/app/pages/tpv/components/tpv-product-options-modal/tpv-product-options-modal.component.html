<ion-modal [isOpen]="isOpen" (didDismiss)="onClose()" class="options-modal">
  <ng-template>
    <ion-header class="ion-no-border">
      <ion-toolbar>
        <ion-title>Opciones de {{ product?.name }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="onClose()">
            <ion-icon name="close-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding">
      <div class="options-grid">
        <!-- Opción por defecto (sin extras/estándar) -->
        <button class="option-btn standard" (click)="onSelectOption(undefined)">
          <div class="option-icon">
            <ion-icon name="fast-food-outline"></ion-icon>
          </div>
          <div class="option-info">
            <span class="name">Estándar</span>
            <span class="price">{{ (getPriceWithTax() / 100) | currency:'EUR':'symbol':'1.2-2':'es-ES' }}</span>
          </div>
        </button>

        <!-- Opciones configuradas -->
        <button *ngFor="let opt of product?.options" class="option-btn" (click)="onSelectOption(opt)">
          <div class="option-icon">
            <ion-icon name="checkmark-circle-outline"></ion-icon>
          </div>
          <div class="option-info">
            <span class="name">{{ opt.name }}</span>
            <span class="price">{{ (getPriceWithTax(opt) / 100) | currency:'EUR':'symbol':'1.2-2':'es-ES' }}</span>
          </div>
          <div class="option-badges">
            <ion-badge color="warning" *ngIf="opt.stock_impact !== 1">{{ opt.stock_impact }}x stock</ion-badge>
          </div>
        </button>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
