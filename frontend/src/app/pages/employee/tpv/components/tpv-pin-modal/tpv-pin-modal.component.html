<ion-modal [isOpen]="isOpen" (didDismiss)="onClose()" class="pin-modal">
  <ng-template>
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Validar PIN - {{ selectedUser?.name }}</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <div class="pin-keypad-container">
        <div class="pin-display">
          <div class="pin-dots">
            <div class="dot" [class.filled]="pinBuffer.length >= 1"></div>
            <div class="dot" [class.filled]="pinBuffer.length >= 2"></div>
            <div class="dot" [class.filled]="pinBuffer.length >= 3"></div>
            <div class="dot" [class.filled]="pinBuffer.length >= 4"></div>
            <div class="dot-more" *ngIf="pinBuffer.length > 4">...</div>
          </div>
        </div>

        <app-tpv-numeric-keypad 
          (digitClick)="onDigitClick($event)" 
          (backspaceClick)="onBackspaceClick()">
        </app-tpv-numeric-keypad>

        <div class="keypad-actions">
          <button class="btn-cancel" (click)="onClose()">Cancelar</button>
          <button class="btn-confirm" (click)="onConfirm()">Aceptar</button>
        </div>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
