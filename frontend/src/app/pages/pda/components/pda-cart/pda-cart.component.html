<div class="pda-view-container">
  <ion-list lines="full">
    <ion-item-sliding *ngFor="let item of cart; let i = index">
      <ion-item>
        <ion-label>
          <h3>{{ item.product.name }}</h3>
          <p>{{ item.quantity }} x {{ (cartService.getPriceWithTax(item.product) / 100) | currency:'EUR' }}</p>
        </ion-label>
        <ion-note slot="end" color="primary">
          {{ (item.quantity * cartService.getPriceWithTax(item.product) / 100) | currency:'EUR' }}
        </ion-note>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="danger" (click)="onRemove(i)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div class="empty-cart" *ngIf="cart.length === 0">
    <ion-icon name="cart-outline"></ion-icon>
    <p>El carrito está vacío</p>
  </div>

  <ion-footer class="ion-no-border" *ngIf="cart.length > 0">
    <ion-toolbar>
      <ion-row>
        <ion-col size="6">
          <ion-button expand="block" (click)="onSend()" color="success">
            ENVIAR
          </ion-button>
        </ion-col>
        <ion-col size="6">
          <ion-button expand="block" (click)="onPay()" color="primary">
            COBRAR ({{ (total / 100) | currency:'EUR' }})
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-toolbar>
  </ion-footer>
</div>
