<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ isEditMode ? 'Editar Impuesto' : 'Nuevo Impuesto' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" color="medium">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding custom-form-content">
  <form [formGroup]="taxForm" (ngSubmit)="onSubmit()" class="yurest-form">

    <div class="form-section">
      <span class="section-title">Detalles del Impuesto</span>

      <div class="form-group">
        <label class="label">Nombre del Impuesto *</label>
        <ion-item lines="none" class="custom-input-item">
          <ion-input formControlName="name" type="text" placeholder="Ej: IVA General, IVA Reducido..."></ion-input>
        </ion-item>
        <small class="helper-text" *ngIf="f['name'].invalid && f['name'].touched">
          El nombre es obligatorio (2-50 caracteres).
        </small>
      </div>

      <div class="form-group">
        <label class="label">Porcentaje (%) *</label>
        <ion-item lines="none" class="custom-input-item">
          <ion-input formControlName="rate" type="number" inputmode="decimal" placeholder="Ej: 21"></ion-input>
        </ion-item>
        <small class="helper-text" *ngIf="f['rate'].invalid && f['rate'].touched">
          Debe ser un valor válido entre 0 y 100.
        </small>
      </div>
    </div>

  </form>
</ion-content>

<div class="form-footer">
  <ion-button fill="clear" (click)="dismiss()" class="btn-cancel">
    Cancelar
  </ion-button>
  <ion-button (click)="onSubmit()" [disabled]="taxForm.invalid" class="btn-submit">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    {{ isEditMode ? 'Guardar Cambios' : 'Crear Impuesto' }}
  </ion-button>
</div>
