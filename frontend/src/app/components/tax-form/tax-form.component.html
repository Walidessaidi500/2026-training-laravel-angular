<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ isEditMode ? 'Editar Impuesto' : 'Nuevo Impuesto' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" color="medium">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding custom-form-content">
  <form [formGroup]="taxForm" (ngSubmit)="onSubmit()" class="yurest-form">

    <div class="form-group">
      <ion-label class="form-label">Nombre del Impuesto <span class="required">*</span></ion-label>
      <ion-item lines="none" class="custom-input-item" [class.has-error]="f['name'].invalid && f['name'].touched">
        <ion-input formControlName="name" type="text" placeholder="Ej: IVA General, IGIC, etc." clearInput>
        </ion-input>
      </ion-item>
      <ion-note color="danger" *ngIf="f['name'].invalid && f['name'].touched" class="error-msg">
        El nombre es obligatorio (2-50 caracteres).
      </ion-note>
    </div>

    <div class="form-group">
      <ion-label class="form-label">Porcentaje (%) <span class="required">*</span></ion-label>
      <ion-item lines="none" class="custom-input-item" [class.has-error]="f['rate'].invalid && f['rate'].touched">
        <ion-input formControlName="rate" type="number" inputmode="decimal" placeholder="Ej: 21" [min]="0" [max]="100">
        </ion-input>
      </ion-item>
      <ion-note color="danger" *ngIf="f['rate'].invalid && f['rate'].touched" class="error-msg">
        Debe ser un valor válido entre 0 y 100.
      </ion-note>
    </div>

  </form>
</ion-content>

<div class="modal-footer">
  <button type="button" class="btn-cancel" (click)="dismiss()">Cancelar</button>
  <button type="submit" class="btn-primary" [disabled]="taxForm.invalid" (click)="onSubmit()">
    <ion-icon name="save-outline"></ion-icon>
    {{ isEditMode ? 'Guardar Cambios' : 'Crear Impuesto' }}
  </button>
</div>
