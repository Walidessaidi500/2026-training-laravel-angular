<ion-header class="ion-no-border sidebar-header">
  <div class="logo-container">
    <div class="logo-icon">
      <ion-icon name="flame"></ion-icon> </div>
  </div>
</ion-header>

<ion-content class="sidebar-content">
  <ion-list lines="none" class="nav-menu">
    
    <ion-item button [class.active]="activeItem === 'dashboard'" (click)="navigate('dashboard')">
      <div class="nav-icon"><ion-icon name="grid-outline"></ion-icon></div>
    </ion-item>

    <ion-item button [class.active]="activeItem === 'productos'" (click)="navigate('productos')">
      <div class="nav-icon"><ion-icon name="cube-outline"></ion-icon></div>
    </ion-item>

    <ion-item button [class.active]="activeItem === 'familias'" (click)="navigate('familias')">
      <div class="nav-icon"><ion-icon name="folder-outline"></ion-icon></div>
    </ion-item>

    <ion-item button [class.active]="activeItem === 'impuestos'" (click)="navigate('impuestos')">
      <div class="nav-icon"><ion-icon name="calculator-outline"></ion-icon></div>
    </ion-item>

    <ion-item button [class.active]="activeItem === 'zonas'" (click)="navigate('zonas')">
      <div class="nav-icon"><ion-icon name="map-outline"></ion-icon></div>
    </ion-item>

    <ion-item button [class.active]="activeItem === 'mesas'" (click)="navigate('mesas')">
      <div class="nav-icon"><ion-icon name="restaurant-outline"></ion-icon></div>
    </ion-item>

  </ion-list>
</ion-content>

<ion-footer class="ion-no-border sidebar-footer">
  <ion-list lines="none">
    <ion-item button class="logout-item" (click)="logout()">
      <div class="avatar-circle">
        <span>JD</span> </div>
    </ion-item>
  </ion-list>
</ion-footer>
