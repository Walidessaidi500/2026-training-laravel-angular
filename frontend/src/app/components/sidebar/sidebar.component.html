<ion-header class="ion-no-border sidebar-header">
  <div class="logo-container">
    <div class="logo-wrapper" title="Restaurante App">
      <img src="assets/icon/favicon.png" alt="Logo" class="sidebar-logo">
    </div>
  </div>
</ion-header>

<ion-content class="sidebar-content">
  <ion-list lines="none" class="nav-menu">

    <!-- Dashboard -->
    <ion-item button [class.active]="activeItem === 'dashboard'" (click)="navigate('dashboard')" title="Dashboard"
      class="nav-item">
      <div class="nav-icon"><ion-icon name="grid-outline"></ion-icon></div>
    </ion-item>

    <!-- Usuarios -->
    <ng-container *ngIf="isAdmin">
      <div class="nav-divider"></div>

      <ion-item button [class.active]="activeItem === 'users'" (click)="navigate('users')" title="Usuarios"
        class="nav-item">
        <div class="nav-icon"><ion-icon name="people-outline"></ion-icon></div>
      </ion-item>
    </ng-container>

    <!-- Impuestos -->
    <div class="nav-divider"></div>

    <ion-item button [class.active]="activeItem === 'taxes'" (click)="navigate('taxes')" title="Impuestos"
      class="nav-item">
      <div class="nav-icon"><ion-icon name="calculator-outline"></ion-icon></div>
    </ion-item>

    <!-- Familias -->
    <div class="nav-divider"></div>
    <ion-item button [class.active]="activeItem === 'families'" (click)="navigate('families')" title="Familias"
      class="nav-item">
      <div class="nav-icon"><ion-icon name="folder-outline"></ion-icon></div>
    </ion-item>

    <!-- Servicio -->
    <div class="nav-divider"></div>

    <ion-item button [class.active]="activeItem === 'products'" (click)="navigate('products')" title="Productos"
      class="nav-item">
      <div class="nav-icon"><ion-icon name="restaurant-outline"></ion-icon></div>
    </ion-item>

    <!-- Zonas -->
    <div class="nav-divider"></div>

    <ion-item button [class.active]="activeItem === 'zones'" (click)="navigate('zones')" title="Zonas" class="nav-item">
      <div class="nav-icon"><ion-icon name="map-outline"></ion-icon></div>
    </ion-item>


    <!-- Mesas -->
    <div class="nav-divider"></div>

    <ion-item button [class.active]="activeItem === 'tables'" (click)="navigate('tables')" title="Mesas"
      class="nav-item">
      <div class="nav-icon"><ion-icon name="restaurant-outline"></ion-icon></div>
    </ion-item>






  </ion-list>
</ion-content>

<ion-footer class="ion-no-border sidebar-footer">

  <ion-item button class="user-menu-item" id="user-menu-trigger" detail="false" lines="none">
    <div class="avatar-circle">
      <ion-icon name="person-outline"></ion-icon>
    </div>
    <!-- Indicador visual de desplegable -->
    <ion-icon name="chevron-down-outline" class="dropdown-icon"></ion-icon>
  </ion-item>

  <!-- Menú desplegable -->
  <ion-popover trigger="user-menu-trigger" triggerAction="click" [dismissOnSelect]="true" class="user-popover">
    <ng-template>
      <ion-content class="ion-padding-vertical">
        <ion-list lines="none" class="popover-list">

          <!-- Opción: Configuración -->
          <ion-item button (click)="navigate('settings')" detail="false">
            <ion-icon name="settings-outline" slot="start"></ion-icon>
            <ion-label>Configuración</ion-label>
          </ion-item>

          <!-- Opción: Logout -->
          <ion-item button (click)="logout()" detail="false" class="logout-option">
            <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
            <ion-label color="danger">Cerrar sesión</ion-label>
          </ion-item>

        </ion-list>
      </ion-content>
    </ng-template>
  </ion-popover>
</ion-footer>
