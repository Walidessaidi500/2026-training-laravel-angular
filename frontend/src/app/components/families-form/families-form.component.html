<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>{{ isEditMode ? 'Editar Familia' : 'Nueva Familia' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" color="medium">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding custom-form-content">
  <form [formGroup]="familyForm" (ngSubmit)="onSubmit()" class="yurest-form">

    <div class="form-section">
      <span class="section-title">Detalles de la Familia</span>

      <div class="form-group">
        <label class="label">Nombre de la Familia *</label>
        <ion-item lines="none" class="custom-input-item">
          <ion-input formControlName="name" type="text" placeholder="Ej: Bebidas, Postres, Principales..."></ion-input>
        </ion-item>
        <small class="helper-text" *ngIf="f['name'].invalid && f['name'].touched">
          El nombre es obligatorio (2-50 caracteres).
        </small>
      </div>

      <div class="form-group">
        <div class="toggle-group">
          <div class="toggle-label">
            <span>¿Familia Activa?</span>
            <small>{{ familyForm.get('active')?.value ? 'Visible en TPV' : 'Oculta en TPV' }}</small>
          </div>
          <ion-toggle formControlName="active" color="success"></ion-toggle>
        </div>
      </div>
    </div>

  </form>
</ion-content>

<div class="form-footer">
  <ion-button fill="clear" (click)="dismiss()" class="btn-cancel">
    Cancelar
  </ion-button>
  <ion-button (click)="onSubmit()" [disabled]="familyForm.invalid" class="btn-submit">
    <ion-icon name="save-outline" slot="start"></ion-icon>
    {{ isEditMode ? 'Guardar Cambios' : 'Crear Familia' }}
  </ion-button>
</div>
